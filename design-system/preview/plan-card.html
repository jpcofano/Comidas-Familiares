<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<title>Plan card (featured)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); font-family: var(--font-sans); }
  .card-feat {
    border: 2px solid var(--primary); border-radius: 14px;
    padding: 16px; background: var(--surface-strong);
  }
  .overline {
    font-size: 12px; font-weight: 700; color: var(--primary);
    text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px;
  }
  .row-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .title { font-weight: 500; font-size: 15px; color: var(--text-strong); }
  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 9999px;
    font-size: 12px; font-weight: 500;
    background: var(--warn-bg); color: var(--warn-text);
  }
  .btnrow { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    min-height: 36px; padding: 6px 14px;
    border: 0; border-radius: 10px;
    font-weight: 500; font-size: 13px; cursor: pointer;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-secondary { background: var(--surface-strong); color: var(--text); border: 1px solid var(--line); }
  .btn-ghost { background: transparent; color: var(--err-text); margin-left: auto; }
  .divider { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .who { font-size: 12px; color: var(--muted); }
  .names { font-size: 13px; color: var(--text); margin-top: 4px; }
</style></head>
<body>
  <div class="card-feat">
    <div class="overline">Especial de la semana</div>
    <div class="row-top">
      <div class="title">Bondiola braseada al Malbec</div>
      <span class="badge">Compra pendiente</span>
    </div>
    <div class="btnrow">
      <button class="btn btn-primary">Cocinar</button>
      <button class="btn btn-secondary">Marcar Cocinada</button>
      <button class="btn btn-secondary">Ver receta</button>
      <button class="btn btn-ghost">Descartar</button>
    </div>
    <div class="divider">
      <div class="who">Quiénes cocinan este plato</div>
      <div class="names">Juan Pablo, María</div>
    </div>
  </div>
</body></html>
