<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<title>Text & borders</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); font-family: var(--font-sans); display: flex; gap: 14px; }
  .col { flex: 1; }
  .section-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .swatch { display: flex; align-items: center; gap: 10px; padding: 7px 0; }
  .dot { width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; border: 1px solid var(--border-subtle); }
  .name { font-size: 13px; color: var(--text-strong); font-weight: 500; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
</style></head>
<body>
  <div class="col">
    <div class="section-title">Text</div>
    <div class="swatch"><div class="dot" style="background:#0e0a07"></div><div><div class="name">--text-strong</div><div class="hex">#0e0a07</div></div></div>
    <div class="swatch"><div class="dot" style="background:#1f1a16"></div><div><div class="name">--text</div><div class="hex">#1f1a16</div></div></div>
    <div class="swatch"><div class="dot" style="background:#4a3f37"></div><div><div class="name">--muted-strong</div><div class="hex">#4a3f37</div></div></div>
    <div class="swatch"><div class="dot" style="background:#6b5d52"></div><div><div class="name">--muted</div><div class="hex">#6b5d52</div></div></div>
  </div>
  <div class="col">
    <div class="section-title">Borders</div>
    <div class="swatch"><div class="dot" style="background:#efe8de"></div><div><div class="name">--border-subtle</div><div class="hex">#efe8de</div></div></div>
    <div class="swatch"><div class="dot" style="background:#e8dfd4"></div><div><div class="name">--border</div><div class="hex">#e8dfd4</div></div></div>
    <div class="swatch"><div class="dot" style="background:#d8cdbe"></div><div><div class="name">--line</div><div class="hex">#d8cdbe</div></div></div>
  </div>
</body></html>
