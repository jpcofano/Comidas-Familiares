<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<title>Type · body & meta</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg); font-family: var(--font-sans); }
  .row { display: flex; align-items: baseline; gap: 18px; padding: 5px 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 140px; flex-shrink: 0; }
</style></head>
<body>
  <div class="row"><div class="tok">md · 15·400</div><div style="font-size:15px;color:var(--text)">Bondiola braseada al Malbec</div></div>
  <div class="row"><div class="tok">base · 14·400 body</div><div style="font-size:14px;color:var(--text);line-height:1.5">Esta semana hay tres comidas elegidas. Marcá cocinadas cuando termines.</div></div>
  <div class="row"><div class="tok">sm · 13·400 (.meta)</div><div style="font-size:13px;color:var(--muted)">Cargando recetas…</div></div>
  <div class="row"><div class="tok">xs · 12·500</div><div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:500">Especial de la semana</div></div>
  <div class="row"><div class="tok">xs · 12·700 count</div><div style="font-size:13px;color:var(--text)"><strong>5</strong> pendientes · <strong>12</strong> ya tengo</div></div>
</body></html>
