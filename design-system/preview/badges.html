<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<title>Estado badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); font-family: var(--font-sans); }
  .grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .badge {
    display: inline-block; padding: 2px 10px;
    border-radius: 9999px; font-size: 12px; font-weight: 500;
  }
  .caption { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-bottom: 10px; }
</style></head>
<body>
  <div class="caption">EstadoBadge — pill, 12px medium, 2px×10px padding</div>
  <div class="grid">
    <span class="badge" style="background:var(--surface-alt); color:var(--muted)">Elegida</span>
    <span class="badge" style="background:var(--warn-bg); color:var(--warn-text)">Compra pendiente</span>
    <span class="badge" style="background:var(--info-bg); color:var(--info-text)">Compra lista</span>
    <span class="badge" style="background:var(--primary); color:#fff">Cocinando</span>
    <span class="badge" style="background:var(--ok-bg); color:var(--ok-text)">Cocinada</span>
    <span class="badge" style="background:var(--surface-alt); color:var(--muted-strong)">Evaluada</span>
  </div>
  <div class="caption" style="margin-top:18px">Chips · tipos & filtros</div>
  <div class="grid">
    <span class="badge" style="background:var(--surface-alt); color:var(--muted-strong)">Receta principal</span>
    <span class="badge" style="background:var(--surface-alt); color:var(--muted-strong)">Pollo</span>
    <span class="badge" style="background:var(--ok-bg); color:var(--ok-text); padding:1px 7px">Sin lácteos</span>
    <span class="badge" style="background:var(--info-bg); color:var(--info-text); padding:1px 7px">Sin hidratos</span>
  </div>
</body></html>
