<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<title>Type · display & headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg); font-family: var(--font-sans); }
  .row { display: flex; align-items: baseline; gap: 18px; padding: 6px 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 140px; flex-shrink: 0; }
  .ex { color: var(--text-strong); }
</style></head>
<body>
  <div class="row"><div class="tok">h1 / 24·700 / -0.01em</div><div class="ex" style="font-size:24px;font-weight:700;letter-spacing:-0.01em;line-height:1.25">Esta semana</div></div>
  <div class="row"><div class="tok">h2 / 20·700 / -0.005em</div><div class="ex" style="font-size:20px;font-weight:700;letter-spacing:-0.005em;line-height:1.25">Lista de compras</div></div>
  <div class="row"><div class="tok">h3 / 17·500</div><div class="ex" style="font-size:17px;font-weight:500;line-height:1.25">Detalle del menú</div></div>
</body></html>
