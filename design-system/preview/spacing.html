<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 14px; padding: 4px 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 100px; flex-shrink: 0; }
  .px { font-size: 11px; color: var(--text); width: 36px; flex-shrink: 0; }
  .bar { height: 16px; background: var(--primary); border-radius: 2px; }
</style></head>
<body>
  <div class="row"><div class="tok">--space-1</div><div class="px">4</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="tok">--space-2</div><div class="px">8</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="tok">--space-3</div><div class="px">12</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="tok">--space-4</div><div class="px">16</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="tok">--space-5</div><div class="px">20</div><div class="bar" style="width:20px"></div></div>
  <div class="row"><div class="tok">--space-6</div><div class="px">24</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="tok">--space-8</div><div class="px">32</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="tok">--space-10</div><div class="px">40</div><div class="bar" style="width:40px"></div></div>
  <div class="row"><div class="tok">--space-12</div><div class="px">48</div><div class="bar" style="width:48px"></div></div>
</body></html>
