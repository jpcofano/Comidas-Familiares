<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<title>Iconography · lucide</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--bg); font-family: var(--font-sans); }
  .caption { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px 8px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text); }
  .item svg { width: 22px; height: 22px; color: var(--text-strong); }
  .item .name { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
</style></head>
<body>
  <div class="caption">lucide-react@1.16.0 · stroke 2 · color: currentColor</div>
  <div class="grid">
    <div class="item"><i data-lucide="home"></i><span class="name">home</span></div>
    <div class="item"><i data-lucide="book-open"></i><span class="name">book-open</span></div>
    <div class="item"><i data-lucide="shopping-bag"></i><span class="name">shopping-bag</span></div>
    <div class="item"><i data-lucide="history"></i><span class="name">history</span></div>
    <div class="item"><i data-lucide="clock"></i><span class="name">clock</span></div>
    <div class="item"><i data-lucide="chef-hat"></i><span class="name">chef-hat</span></div>
    <div class="item"><i data-lucide="plus"></i><span class="name">plus</span></div>
    <div class="item"><i data-lucide="chevron-left"></i><span class="name">chevron-left</span></div>
    <div class="item"><i data-lucide="chevron-right"></i><span class="name">chevron-right</span></div>
    <div class="item"><i data-lucide="chevron-down"></i><span class="name">chevron-down</span></div>
    <div class="item"><i data-lucide="log-out"></i><span class="name">log-out</span></div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
