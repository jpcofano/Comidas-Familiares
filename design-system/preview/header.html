<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<title>Header</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 16px; background: var(--surface-alt); font-family: var(--font-sans); }
  .app-header {
    background: var(--bg); border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow-header);
    padding: 12px 16px; border-radius: 0;
  }
  .header-inner {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }
  .title {
    font-size: 17px; font-weight: 700; color: var(--primary);
    letter-spacing: -0.01em; margin: 0;
  }
  .avatar-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 8px; background: transparent; border: 0;
    border-radius: 9999px; cursor: pointer; font-family: inherit;
  }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--primary); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 500; font-size: 13px;
  }
  .uname { font-weight: 500; color: var(--text); font-size: 14px; }
</style></head>
<body>
  <div class="app-header">
    <div class="header-inner">
      <h1 class="title">Comida Familiar</h1>
      <button class="avatar-btn">
        <span class="avatar">J</span>
        <span class="uname">Juan Pablo</span>
      </button>
    </div>
  </div>
</body></html>
