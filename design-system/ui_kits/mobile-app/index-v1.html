<!doctype html>
<html lang="es" data-screen-label="Comida Familiar — UI Kit">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comida Familiar · UI Kit</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; background: #1f1a16; height: 100%; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 24px 16px; box-sizing: border-box; min-height: 100vh; gap: 16px; }
    .stage {
      width: 390px; height: 720px;
      background: var(--bg);
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.35), 0 0 0 8px #0e0a07, 0 0 0 9px #2a221d;
      position: relative;
      display: flex; flex-direction: column;
    }
    .stage-label {
      color: #d8cdbe; font-family: var(--font-sans); font-size: 12px;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="stage-label">Comida Familiar · Mobile UI Kit</div>
  <div class="stage" id="device-stage">
    <div id="root" style="flex: 1; overflow: hidden;"></div>
  </div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"           integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"   integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"           integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Lucide icons (CDN) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Components -->
  <script type="text/babel" src="Button.jsx"></script>
  <script type="text/babel" src="EstadoBadge.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="BottomNav.jsx"></script>
  <script type="text/babel" src="LoginScreen.jsx"></script>
  <script type="text/babel" src="HomeScreen.jsx"></script>
  <script type="text/babel" src="BibliotecaScreen.jsx"></script>
  <script type="text/babel" src="ComprasScreen.jsx"></script>
  <script type="text/babel" src="DetalleRecetaScreen.jsx"></script>
  <script type="text/babel" src="CocinarScreen.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
